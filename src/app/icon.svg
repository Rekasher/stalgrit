<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark rounded background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- subtle inner border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="5.5" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <!-- nail: head at lower-left, tip at upper-right (rotate -135deg around center) -->
  <g transform="rotate(-135 16 16)" fill="#10b981">
    <!-- head (wide flat top) -->
    <rect x="11" y="5" width="10" height="3.5" rx="1"/>
    <!-- shaft -->
    <rect x="14.5" y="8.5" width="3" height="16"/>
    <!-- tip (triangle) -->
    <polygon points="14.5,24.5 17.5,24.5 16,27"/>
  </g>
</svg>
